<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Befejezés 04</title>
  <style>
    html, body { height: 100%; }
    body{
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .wrap{
      width: min(960px, 100%);
      margin-top: 40px;
      padding: 0 12px;
      box-sizing: border-box;
    }
    .video{
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
    }
    .video iframe{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="video">
      <iframe
        src="https://www.youtube.com/embed/QQA0GWIschM"
        title="Befejezés 04"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
