<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Befejezés 04</title>

<style>
html, body { height: 100%; }
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.wrap{
  width: min(960px, 100%);
  margin-top: 40px;
  padding: 0 12px;
  box-sizing: border-box;
}

.video{
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  height: 0;
}

.video iframe{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* Záró szöveg – alapból rejtve */
.note{
  margin: 30px auto 40px auto;
  max-width: 820px;
  text-align: center;
  line-height: 1.5;
  font-size: 17px;
  color: rgba(255,255,255,0.9);

  opacity: 0;
  transform: translateY(15px);
  transition: all 1.2s ease;
}

.note.show{
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<div class="wrap">
  <div class="video">
    <iframe
      id="mainVideo"
     src="https://www.youtube.com/embed/QQA0GWIschM?enablejsapi=1&autoplay=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <div id="closingText" class="note">
    <p>Ez a történet nem azt méri,<br>hogy jó vagy rossz ember vagy.</p>

    <p>Bárhova is kerültél a teszt után,<br>nem minősít.</p>

    <p>A két lator is egyforma volt.</p>

    <p>Csak a végső szorításban<br>másképp látták a valóságot.</p>

    <p>Az egyik még menteni akarta magát.<br>A másik már vállalta a helyzetét.</p>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
var player;
var shown = false;
var SHOW_AT = 85; // 1:25

function onYouTubeIframeAPIReady() {
  player = new YT.Player('mainVideo', {
    events: { 'onReady': onPlayerReady }
  });
}

function onPlayerReady() {
  setInterval(function () {
    if (!player || shown) return;

    var t = 0;
    try { t = player.getCurrentTime(); } catch (e) { return; }

    if (t >= SHOW_AT) {
      document.getElementById("closingText").classList.add("show");
      shown = true;
    }
  }, 500);
}
</script>

</body>
</html>
